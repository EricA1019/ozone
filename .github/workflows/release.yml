name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare_tag:
    name: Ensure release tag
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            TAG=$(sed -n 's/^version = "\(.*\)"/v\1/p' Cargo.toml | head -n 1)
            if [ -z "$TAG" ]; then
              echo "Failed to resolve version from Cargo.toml" >&2
              exit 1
            fi
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag if missing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG=${{ steps.version.outputs.tag }}
          if ! git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed $TAG"
          else
            echo "Tag $TAG already exists; nothing to do on this run."
          fi

  build:
    name: Build Linux x86_64
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/ozone

      - name: Package
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          ARCHIVE="ozone-${VERSION}-linux-x86_64.tar.gz"
          cp target/release/ozone ozone
          tar -czf "$ARCHIVE" ozone contrib/launch-koboldcpp.sh README.md LICENSE
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
